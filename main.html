<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>File Encryptor</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<button id="theme">☾</button>
<main>
  <h1>File Encriptor</h1>
  <p class="sub">Encrypt and decrypt files from your browser!</p>

  <div class="tabs">
    <button class="on" id="t-enc">Encrypt</button>
    <button id="t-dec">Decrypt</button>
  </div>

  <label for="file">File</label>
  <input type="file" id="file">

  <label for="pw">Password</label>
  <input type="password" id="pw" placeholder="min. 8 characters">

  <button id="go">Encrypt</button>

  <p id="status"></p>
</main> 

</body>
</html>
