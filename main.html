<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>File Encryptor</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<button id="theme" title="Toggle theme">☾</button>

<main>
  <h1>File Encryptor</h1>
  <p class="sub">Encrypt and decrypt files from your browser.</p>

  <div class="tabs">
    <button class="on" id="t-enc">Encrypt</button>
    <button id="t-dec">Decrypt</button>
  </div>

  <label for="file">File</label>
  <div class="file-row">
    <input type="file" id="file">
    <button id="clear" class="clear hidden" title="Remove file">✕</button>
  </div>

  <label for="pw">Password</label>
  <input type="password" id="pw" placeholder="min. 8 characters">

  <button id="go">Encrypt</button>

  <p id="status"></p>
</main>

<script src="./script.js"></script>
</body>
</html>
